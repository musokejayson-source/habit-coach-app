name: habit_coach_app
description: A Flutter app for AI-powered habit tracking with social challenges and streak gamification.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.0
  firebase_auth: ^4.14.0
  cloud_firestore: ^4.14.0
  firebase_messaging: ^14.6.0
  provider: ^6.1.0
  get: ^4.6.5
  intl: ^0.19.0
  uuid: ^4.0.0
  charts_flutter: ^0.12.0
  flutter_dotenv: ^5.1.0
  cached_network_image: ^3.3.0
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_linter:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
  fonts:
    - family: Segoe
      fonts:
        - asset: assets/fonts/SegoeUI-Regular.ttf
        - asset: assets/fonts/SegoeUI-Bold.ttf
          weight: 700
